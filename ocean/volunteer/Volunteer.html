<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+TC&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body,
        html {
            width: 100%;
            font-family: 'LXGW WenKai TC', serif;
            color: white;
        }

        /* ====== 主背景 ====== */
        main {
            min-height: 100vh;
            background-image: url(./quality_restoration_20240614164310016.jpg);
            background-size: cover;
            background-position: center;
            padding-top: 200px;
            padding-bottom: 80px;
        }

        /* ====== 照片群組 ====== */
        .circle-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 36px;
            margin-bottom: 80px;
        }

        .circle {
            width: 240px;
            height: 240px;
            perspective: 1000px;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        .circle:hover {
            transform: translateY(-10px) scale(1.05);
        }

        .circle .inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s;
        }

        .circle:hover .inner {
            transform: rotateY(180deg);
        }

        .circle img {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            backface-visibility: hidden;
            object-fit: cover;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
            transition: box-shadow 0.4s ease;
        }

        .circle:hover img {
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.4);
        }

        .circle .back {
            transform: rotateY(180deg);
        }

        /* ====== 內容玻璃卡片 ====== */
        .content-container {
            max-width: 1100px;
            margin: auto;
            padding: 50px 60px;
            background: rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.35);
        }

        .intro-text {
            font-size: 20px;
            line-height: 1.9;
            text-align: center;
            margin-bottom: 50px;
            opacity: 0.95;
        }

        .text-content {
            display: flex;
            gap: 40px;
        }

        .text-card {
            flex: 1;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 30px;
        }

        .text-card h2 {
            margin-bottom: 14px;
            font-size: 22px;
        }

        .text-card p {
            line-height: 1.8;
            font-size: 16px;
        }

        /* ====== CTA 按鈕 ====== */
        .link1 {
            text-align: center;
            margin-top: 70px;
        }

        .link1 a {
            display: inline-block;
            padding: 16px 42px;
            font-size: 22px;
            border-radius: 999px;
            background: white;
            color: #4e58ad;
            text-decoration: none;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.35);
            transition: all 0.3s ease;
        }

        .link1 a:hover {
            background: #4e58ad;
            color: white;
            transform: translateY(-4px);
        }

        /* ====== 滾動動畫 ====== */
        .fade-up {
            opacity: 0;
            transform: translateY(40px);
            transition: all 0.9s ease;
        }

        .fade-up.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* ====== RWD ====== */
        @media (max-width: 768px) {
            .text-content {
                flex-direction: column;
            }

            .content-container {
                padding: 40px 30px;
            }
        }

        .ripple {
            position: absolute;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: radial-gradient(circle,
                    rgba(120, 200, 255, 0.45) 0%,
                    rgba(80, 170, 230, 0.35) 25%,
                    rgba(60, 140, 210, 0.25) 45%,
                    rgba(40, 110, 180, 0.15) 60%,
                    rgba(40, 110, 180, 0.05) 70%,
                    transparent 75%);
            transform: translate(-50%, -50%);
            animation: ripple-effect 2.2s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
            filter: blur(0.4px);
        }

        @keyframes ripple-effect {
            0% {
                transform: translate(-50%, -50%) scale(0.3);
                opacity: 0.7;
            }

            40% {
                opacity: 0.5;
            }

            100% {
                transform: translate(-50%, -50%) scale(14);
                opacity: 0;
            }
        }

        /* 確保 main 是定位基準 */
        main {
            position: relative;
        }
    </style>
</head>

<body>

    <!-- 你的 JS -->
    <script src="../goods/nav.js"></script>

    <!-- 動畫 -->
    <script>
        const items = document.querySelectorAll('.fade-up');
        const observer = new IntersectionObserver(entries => {
            entries.forEach(e => {
                if (e.isIntersecting) e.target.classList.add('show');
            });
        }, { threshold: 0.2 });

        items.forEach(i => observer.observe(i));
    </script>

    <script>
        const main = document.querySelector('main');
        const rippleLayer = document.getElementById('ripple-layer');

        let lastTime = 0;

        main.addEventListener('mousemove', (e) => {
            const now = Date.now();

            // 控制生成頻率（避免太密）
            if (now - lastTime < 180) return;
            lastTime = now;

            const ripple = document.createElement('div');
            ripple.className = 'ripple';

            const rect = main.getBoundingClientRect();
            ripple.style.left = `${e.clientX - rect.left}px`;
            ripple.style.top = `${e.clientY - rect.top}px`;

            rippleLayer.appendChild(ripple);

            ripple.addEventListener('animationend', () => {
                ripple.remove();
            });
        });
    </script>
